name: Build Roblox Update Bypass .deb (Theos)

on:
  push:
    branches: [ main, master, roblox-bypass, ci-test ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: /Users/runner/theos
    steps:
      - name: Checkout repository (brings in Makefile + control + Tweak.xm)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify source files are present and will be used
        run: |
          echo "=== Files in $GITHUB_WORKSPACE ==="
          ls -la
          echo ""
          echo "=== Explicitly confirming the three core files exist ==="
          test -f Makefile && echo "✓ Makefile present" || { echo "✗ Missing Makefile"; exit 1; }
          test -f control && echo "✓ control present" || { echo "✗ Missing control"; exit 1; }
          test -f Tweak.xm && echo "✓ Tweak.xm present" || { echo "✗ Missing Tweak.xm"; exit 1; }
          echo ""
          echo "All source files detected. 'make package' will now compile using exactly these files."

      - name: Setup Theos (FORCE fresh clone + submodule for dm.pl + chmod)
        run: |
          set -e
          rm -rf $THEOS
          mkdir -p $THEOS
          git clone --depth=1 https://github.com/theos/theos.git $THEOS
          
          echo ""
          echo "=== DEBUG: Full contents of $THEOS after clone ==="
          ls -la $THEOS

          # Fix the dm.pl symlink (it points to vendor/dm.pl/dm.pl)
          git -C $THEOS submodule update --init --recursive --depth=1 || true
          chmod +x $THEOS/bin/dm.pl || true
          chmod +x $THEOS/vendor/dm.pl/dm.pl || true

          echo ""
          echo "=== DEBUG after submodule + chmod ==="
          ls -l $THEOS/bin/dm.pl || echo "dm.pl symlink still broken"
          ls -l $THEOS/vendor/dm.pl/dm.pl || echo "vendor target missing"

          if [ ! -f "$THEOS/makefiles/common.mk" ]; then
            echo "FATAL: common.mk missing."
            exit 1
          fi
          echo "Theos verified."

          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer || true
          export SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "SDKROOT=$SDKROOT" >> $GITHUB_ENV
          echo "Theos + dm.pl fix complete."

      - name: Install build tools
        run: |
          brew update
          brew install make ldid dpkg coreutils

      - name: Build the .deb using the provided Makefile + Tweak.xm + control
        run: |
          set -e
          export THEOS=/Users/runner/theos
          export SDKROOT=$SDKROOT
          export PATH="$THEOS/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          echo "=== DEBUG in build step ==="
          echo "THEOS=$THEOS"
          echo "PATH=$PATH"
          echo "which dm.pl: $(which dm.pl || echo 'dm.pl NOT FOUND')"
          ls -l $THEOS/bin/dm.pl || echo "dm.pl symlink missing"
          echo "Forcing make..."
          THEOS=/Users/runner/theos PATH="$THEOS/bin:/opt/homebrew/bin:/usr/local/bin:$PATH" make THEOS=/Users/runner/theos clean package
          echo ""
          echo "=== Build complete. Artifacts produced: ==="
          ls -la packages/ 2>/dev/null || echo "packages/ directory not found (see make logs above)"

      - name: Upload final .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: RobloxUpdateBypass-${{ github.run_number }}
          path: packages/*.deb
          retention-days: 90
          if-no-files-found: warn

      - name: Upload dylib (for direct Frida / injection use)
        uses: actions/upload-artifact@v4
        with:
          name: RobloxUpdateBypass-dylib-${{ github.run_number }}
          path: .theos/obj/arm64/*.dylib
          retention-days: 90
          if-no-files-found: ignore
